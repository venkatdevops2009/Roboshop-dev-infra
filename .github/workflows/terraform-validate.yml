name: Terraform Validate & Plan

on:
  pull_request:
    paths:
      - '**.tf'
      - '.github/workflows/terraform-validate.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-validate:
    name: Validate & Plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform-dir: [
          '00-vpc',
          '10-sg',
          '20-sg-rules',
          '30-bastion',
          '40-databases',
          '50-backend-alb',
          '60-catalogue',
          '70-acm',
          '80-frontend-alb',
          '90-components',
          '95-cdn'
        ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.10.0'

      - name: Terraform Init
        run: |
          cd ${{ matrix.terraform-dir }}
          terraform init -backend=false
        env:
          TF_CLI_ARGS: '-no-color'

      - name: Terraform Validate
        run: |
          cd ${{ matrix.terraform-dir }}
          terraform validate

      - name: Terraform Plan (Dry Run)
        run: |
          cd ${{ matrix.terraform-dir }}
          terraform plan -no-color 2>/dev/null || true
        continue-on-error: true